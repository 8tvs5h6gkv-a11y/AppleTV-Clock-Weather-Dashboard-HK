<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="lunar.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        /* 左側：時鐘資訊 (50%) */
        #clock-side { flex: 0 0 35%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 2px solid #333; }
        #time { font-size: 15rem; font-weight: bold; }
        #date { font-size: 3.5rem; color: #E4B028; margin-top: 10px; }
        #lunar-term { font-size: 3rem; color: #FF8F00; margin-top: 10px; }
        #lunar-date { font-size: 3.5rem; color: #E4B028; margin-top: 10px; }
        
        /* 右側：天氣資訊 (50%) */
        #weather-side { flex: 0 0 65%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        /* 指定字體大小 */
        .temp { font-size: 8rem; font-weight: bold; }
        #hum { font-size: 4rem; color: #65DCD5; margin: 10px 0; }
        #warning-info { font-size: 2rem; color: #FF4444; font-weight: bold; margin: 20px 0; }
        #forecast-desc { font-size: 2rem; color: #fff; padding: 0 40px; line-height: 1.2; }
        #update-time { font-size: 1.5rem; color: #fff; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="clock-side">
        <div id="time">00:00</div>
        <div id="date">--/--/----</div>
        <div id="lunar-term">節氣：--</div>
        <div id="lunar-date">--年 --月 --日</div>
    </div>
    
    <div id="weather-side">
        <div class="temp" id="temp">--°C</div>
        <div id="hum">濕度：--%</div>
        <div id="warning-info">無生效警告</div>
        <div id="forecast-desc">載入預報中...</div>
        <div id="update-time">最後更新：--:--</div>
    </div>



    <script>
        function updateDisplay() {
            const now = new Date();
            // 更新時間
            document.getElementById('time').innerText = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            
            // 使用 lunar.js 計算農曆 (lunar.js 預設匯出為 Lunar)
            const d = Lunar.fromDate(now);
            document.getElementById('lunar-term').innerText = "節氣：" + (d.getJieQi() || "無");
            document.getElementById('lunar-date').innerText = `${d.getYearInGanZhiExact()}年 ${d.getMonthInGanZhiExact()}月 ${d.getDayInGanZhiExact2()}日`;
            
            // 每日凌晨自動重整頁面，防止瀏覽器記憶體堆積
            if (now.getHours() === 4 && now.getMinutes() === 0 && now.getSeconds() === 0) {
                location.reload();
            }
        }

        // 天氣 API 獲取
        async function fetchAllWeatherInfo() {
    const rhrUrl = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";
    const flwUrl = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc";

    try {
        // 同時獲取兩個 API 資料
        const [rhrRes, flwRes] = await Promise.all([fetch(rhrUrl), fetch(flwUrl)]);
        const rhrData = await rhrRes.json();
        const flwData = await flwRes.json();

        // 1. 氣溫 & 濕度 (來自 rhrread)
        const tempObj = rhrData.temperature.data.find(i => i.place === '香港天文台');
        const humObj = rhrData.humidity.data.find(i => i.place === '香港天文台');
        document.getElementById('temp').innerText = tempObj.value + '°C';
        document.getElementById('hum').innerText = `濕度：${humObj.value}%`;

        // 2. 警告資訊 (來自 rhrread)
        document.getElementById('warning-info').innerText = rhrData.warningMessage ? rhrData.warningMessage : "無生效警告";

        // 3. 本港地區天氣預報 (來自 flw)
        document.getElementById('forecast-desc').innerText = flwData.generalSituation || "暫無預報資訊";

        // 4. 更新時間 (來自 rhrread)
        document.getElementById('update-time').innerText = `最後更新：${rhrData.updateTime.substring(11, 16)}`;

    } catch (e) {
        console.error("更新天氣失敗:", e);
    }
}




        setInterval(updateDisplay, 1000);
        updateDisplay();
        fetchAllWeatherInfo();
        setInterval(fetchAllWeatherInfo, 600000); // 每 10 分鐘自動更新
    </script>
</body>
</html>
